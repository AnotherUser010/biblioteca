<label class="form-label">Usuario</label>
<select id="id_usuario" class="form-select mb-3">
  <option value="" selected disabled>-- Selecciona un usuario --</option>
</select>
<label class="form-label">Libro</label>
<select id="id_libro" class="form-select mb-3">
  <option value="" selected disabled>-- Selecciona un libro --</option>
</select>

<button onclick="guardarPrestamo()" class="btn btn-dark mt-2">Prestar</button><br><br>

<h3>Historial de préstamos</h3>
<table class="table table-striped table-hover table-bordered mt-3">
  <thead class="table-dark">
    <tr>
      <th>Usuario</th>
      <th>Libro</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody id="historial"></tbody>
</table>

<script>

  // usuarios
  console.log("CARGANDO USUARIOS");
  fetch('listar_usuarios.php')
    .then(res => res.json())
    .then(data => {
      const select = document.getElementById('id_usuario');

      data.forEach(u => {
        const option = document.createElement('option');
        option.value = u.id_usuario;
        option.textContent = u.nombre;
        select.appendChild(option);
      });
    });

  // libros
  fetch('listar_libros.php')
    .then(res => res.json())
    .then(data => {
      const select = document.getElementById('id_libro');

      data.forEach(l => {
        const option = document.createElement('option');
        option.value = l.id_libro;
        option.textContent = l.titulo;
        select.appendChild(option);
      });
    });

  // Cargar historial
  function cargarHistorial() {
    fetch('listar_prestamos.php')
      .then(res => res.json())
      .then(data => {
        const tabla = document.getElementById('historial');
        tabla.innerHTML = "";

        data.forEach(p => {
          const fila = document.createElement('tr');

          fila.innerHTML = `
          <td>${p.nombre}</td>
          <td>${p.titulo}</td>
          <td>${p.fecha}</td>
        `;

          tabla.appendChild(fila);
        });
      });
  }

  // guardar préstamo
function guardarPrestamo() {
  const id_usuario = document.getElementById('id_usuario').value;
  const id_libro = document.getElementById('id_libro').value;

  if (id_usuario === "") {
    alert("Selecciona un usuario");
    return;
  }

  if (id_libro === "") {
    alert("Selecciona un libro");
    return;
  }

  fetch('prestamo.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `id_usuario=${id_usuario}&id_libro=${id_libro}`
  })
  .then(res => res.text())
  .then(data => {
    alert(data);

    // reset selects
    document.getElementById('id_usuario').value = "";
    document.getElementById('id_libro').value = "";

    // recargar historial
    cargarHistorial();
  });
}

  cargarHistorial();

</script>
