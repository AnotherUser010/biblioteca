<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro</title>
  <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
  <link href="./wwwroot/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">
  <script src="./wwwroot/js/jquery-4.0.0.min.js"></script>
  <script src="./wwwroot/js/script.js"></script>
</head>

<body>
  <main id="main">
    <div class="container-lg d-flex flex-column">
      <div class="row align-items-center justify-content-center no-gutters">
        <div class="col-md-7 col-lg-5">
          <div class="shadow mt-5 p-5 bg-white rounded-3 border">
            <div class="w-100 text-center">
              <h1 class="glitch" data-text="Registrate">Registrate</h1>
            </div>
            <div class="col-12">
              <div class="mb-3">
                <label for="nombre" class="form-label">Nombre completo</label>
                <input class="form-control" id="nombre" placeholder="Ej. Nombre Ejemplo">
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input class="form-control" id="email" placeholder="ejemplo@gmail.com">
              </div>
              <div class="mb-3">
                <label for="pwd" class="form-label">Contraseña</label>
                <input class="form-control" type="password" id="pwd" placeholder="*****************">
              </div>
              <div class="d-flex justify-content-between py-3">
                <div>
                  <span class="small text-muted">¿Ya tienes cuenta?</span>
                  <a class="small text-decoration-none link-custom" href="index.php"> Iniciar sesión</a>
                </div>
                <button class="btn btn-outline-dark btn-login" onclick="registroUsuarios();"> Registrarse</button>

              </div>
            </div>
          </div>


        </div>

      </div>

    </div>
  </main>

  <script>
function registroUsuarios(){

	let nombre = $("#nombre").val();
	let email = $("#email").val();
	let password = $("#pwd").val();

	let formData = new FormData();
	formData.append("nombre", nombre);
	formData.append("email", email);
	formData.append("pwd", password);

  if (!nombre || !email || !password) {
    alert("Completa todos los campos");
    return;
}

	$.ajax({
		url: "registro.php",
		data: formData,
		processData: false,
		contentType: false,
		type: "POST",
		success: function(res){

			if (res.trim() === "ok") {
				alert("Usuario registrado");
				$("#main").load("index.php");
			} else {
				alert(res);
			}
		}
	});
}
  </script>

</body>

</html>
